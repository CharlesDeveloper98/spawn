name: Generate Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create myApp com.charles.spawn "Spawn"
          rm -rf myApp/www/*
          # Copying all necessary files to the www directory
          cp index.html myApp/www/
          cp script.js myApp/www/
          cp style.css myApp/www/

      - name: Setup Android Platform
        run: |
          cd myApp
          cordova platform add android

      - name: Compile APK
        run: |
          cd myApp
          cordova build android --debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Music-Player-APK
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
